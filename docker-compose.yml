# Сети и тома — объявляем заранее
# Все контейнеры будут в одной сети и смогут
# обращаться друг к другу по имени сервиса
networks:
  etl-network:
    driver: bridge

volumes:
  hadoop_namenode:    # постоянное хранилище метаданных HDFS
  hadoop_datanode:    # постоянное хранилище самих данных
  postgres_data:      # база данных Airflow
  airflow_logs:       # логи всех запусков DAG
  metastore_db:      # база данных для Hive Metastore

# ─────────────────────────────────────────
# HDFS
# ─────────────────────────────────────────
services:

  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    networks:
      - etl-network
    ports:
      - "9870:9870"
      - "9000:9000"
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    environment:
      - CLUSTER_NAME=etl-cluster
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_namenode_name_dir=file:///hadoop/dfs/name
      - HDFS_CONF_dfs_permissions_enabled=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9870"]
      interval: 30s
      timeout: 10s
      retries: 5

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    networks:
      - etl-network
    ports:
      - "9864:9864"
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    environment:
      - SERVICE_PRECONDITION=namenode:9870
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HDFS_CONF_dfs_replication=1
      - HDFS_CONF_dfs_datanode_data_dir=file:///hadoop/dfs/data
      - HDFS_CONF_dfs_permissions_enabled=false
    depends_on:
      namenode:
        condition: service_healthy

# ─────────────────────────────────────────
# SPARK
# ─────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    hostname: spark-master
    networks:
      - etl-network
    ports:
      - "8081:8080"
      - "7077:7077"
    environment:
      - SPARK_NO_DAEMONIZE=true
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    volumes:
      - ./jobs:/opt/spark/jobs  # папка с нашими PySpark задачами, чтобы мастер мог их видеть
    env_file:
      - .env

  spark-worker:
    image: apache/spark:3.5.3
    container_name: spark-worker
    hostname: spark-worker
    networks:
      - etl-network
    ports:
      - "8082:8081"
    environment:
      - SPARK_NO_DAEMONIZE=true
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    env_file:
      - .env
    depends_on:
      - spark-master
# ─────────────────────────────────────────
# AIRFLOW
# ─────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: airflow-postgres
    networks:
      - etl-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5

  airflow-init:
    image: apache/airflow:2.8.1
    container_name: airflow-init
    restart: "no"  # этот контейнер не перезапускается, он выполняет инициализацию и завершается
    networks:
      - etl-network
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    # Этот контейнер запускается ОДИН РАЗ — создаёт таблицы в БД
    # и создаёт admin пользователя, потом завершается
    command: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com"

  airflow-scheduler:
    image: apache/airflow:2.8.1
    container_name: airflow-scheduler
    networks:
      - etl-network
    depends_on:
      - airflow-init
    volumes:
      - ./dags:/opt/airflow/dags          # наши DAG-и
      - ./jobs:/opt/spark/jobs          # наши PySpark jobs
      - airflow_logs:/opt/airflow/logs
      - /var/run/docker.sock:/var/run/docker.sock  # нужно для запуска PySpark задач внутри контейнера Airflow
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    command: scheduler

  airflow-webserver:
    image: apache/airflow:2.8.1
    container_name: airflow-webserver
    networks:
      - etl-network
    depends_on:
      - airflow-scheduler
    ports:
      - "8080:8080"   # Airflow UI — откроешь localhost:8080
    volumes:
      - ./dags:/opt/airflow/dags
      - ./jobs:/opt/spark/jobs
      - airflow_logs:/opt/airflow/logs
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    command: webserver

    # ─────────────────────────────────────────
    # Superset
    # ─────────────────────────────────────────
  superset:
    image: apache/superset:3.1.0
    container_name: superset
    networks:
      - etl-network
    ports:
      - "8088:8088"
    environment:
      - SUPERSET_SECRET_KEY=superset_secret_key_for_dev
    depends_on:
      - postgres
    command: >
      bash -c "pip install pyhive thrift thrift-sasl && superset db upgrade && superset fab create-admin --username admin --firstname Admin --lastname User --email admin@superset.com --password admin && superset init && superset run -h 0.0.0.0 -p 8088"
  trino:
    image: trinodb/trino:426
    container_name: trino
    hostname: trino
    networks:
      - etl-network
    ports:
      - "8089:8080"
    volumes:
      - ./docker/trino/config.properties:/etc/trino/config.properties
      - ./docker/trino/node.properties:/etc/trino/node.properties
      - ./docker/trino/jvm.config:/etc/trino/jvm.config
      - ./docker/trino/catalog:/etc/trino/catalog
      - ./docker/trino/core-site.xml:/etc/trino/core-site.xml
    depends_on:
      namenode:
        condition: service_healthy

# ─────────────────────────────────────────
# hive

  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    hostname: hive-metastore
    networks:
      - etl-network
    ports:
      - "9083:9083"
    volumes:
      - ./docker/trino/metastore-site.xml:/opt/hive/conf/hive-site.xml
      - ./docker/trino/core-site.xml:/opt/hadoop/etc/hadoop/core-site.xml
    environment:
      - SERVICE_NAME=metastore
      - DB_DRIVER=postgres
      - SERVICE_OPTS=-Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
          -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://metastore-db:5432/metastore
          -Djavax.jdo.option.ConnectionUserName=airflow
          -Djavax.jdo.option.ConnectionPassword=airflow
    depends_on:
      namenode:
        condition: service_healthy
      metastore-db:
        condition: service_healthy

# ─────────────────────────────────────────
# База данных для Hive Metastore


  metastore-db:
    image: postgres:13
    container_name: metastore-db
    networks:
      - etl-network
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: metastore
    volumes:
      - metastore_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5